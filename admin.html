<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel | Muhammad Anas</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="admin.css">
</head>
<body>
    <!-- Custom Cursor -->
    <div class="cursor" id="cursor"></div>
    <div class="cursor-dot" id="cursorDot"></div>
    <div class="mouse-glow" id="mouseGlow"></div>

    <!-- Aurora Background -->
    <div class="aurora-bg">
        <div class="aurora aurora-1"></div>
        <div class="aurora aurora-2"></div>
        <div class="aurora aurora-3"></div>
    </div>
    <div class="grid-pattern"></div>

    <!-- Login Screen -->
    <div id="loginScreen" class="login-screen">
        <div class="login-box glass-card">
            <div class="login-icon">
                <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                    <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                </svg>
            </div>
            <h2>Admin Login</h2>
            <p style="color:#94A3B8; margin-bottom:1.5rem;">Enter password to access dashboard</p>
            <input type="password" id="passwordInput" placeholder="Password" onkeydown="if(event.key==='Enter')login()">
            <button class="btn-primary" onclick="login()">Login</button>
            <p id="loginError" style="color:#ff6b6b; margin-top:1rem;"></p>
        </div>
    </div>

    <!-- Dashboard -->
    <div id="dashboard" class="dashboard" style="display:none;">
        <header class="admin-header glass-card">
            <div class="header-left">
                <h1><span class="gradient-text">Admin</span> Panel</h1>
                <p style="color:#94A3B8;">Manage your portfolio content</p>
            </div>
            <div class="header-actions">
                <button class="btn-secondary" onclick="previewPortfolio()">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
                    Preview
                </button>
                <button class="btn-save" onclick="saveAllData()">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path><polyline points="17 21 17 13 7 13 7 21"></polyline><polyline points="7 3 7 8 15 8"></polyline></svg>
                    Save All
                </button>
                <button class="btn-danger" onclick="resetData()">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="1 4 1 10 7 10"></polyline><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"></path></svg>
                    Reset
                </button>
                <button class="btn-logout" onclick="logout()">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
                    Logout
                </button>
            </div>
        </header>

        <div class="tabs glass-card">
            <button class="tab active" onclick="switchTab('hero')">Hero</button>
            <button class="tab" onclick="switchTab('about')">About</button>
            <button class="tab" onclick="switchTab('skills')">Skills</button>
            <button class="tab" onclick="switchTab('education')">Education</button>
            <button class="tab" onclick="switchTab('projects')">Projects</button>
            <button class="tab" onclick="switchTab('experience')">Experience</button>
            <button class="tab" onclick="switchTab('certifications')">Certifications</button>
            <button class="tab" onclick="switchTab('achievements')">Achievements</button>
            <button class="tab" onclick="switchTab('contact')">Contact</button>
            <button class="tab" onclick="switchTab('resume')">Resume</button>
            <button class="tab" onclick="switchTab('settings')">Settings</button>
        </div>

        <div class="tab-content glass-card" id="tabContent"></div>
    </div>

    <script src="admin.js"></script>
</body>
</html>
